<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>중국어 단어 퀴즈 마스터</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #16a085;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .mode-select {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        button:hover {
            opacity: 0.9;
        }

        button.active {
            background-color: var(--secondary-color);
            font-weight: bold;
        }

        .quiz-box {
            margin: 20px 0;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .question {
            font-size: 3.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
            word-break: break-all;
        }

        .question.pinyin-mode {
            font-size: 2.2rem;
            color: #16a085;
        }

        .hint {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-top: 10px;
            height: 24px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1.1rem;
            outline: none;
            -webkit-appearance: none;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--secondary-color);
        }

        .result {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
            height: 30px;
        }

        .correct { color: #27ae60; }
        .incorrect { color: #c0392b; }

        .score-board {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
            border-top: 1px solid #ecf0f1;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🇨🇳 중국어 단어 퀴즈 마스터</h1>
    
    <div class="mode-select">
        <button id="btn-hanzi" class="active" onclick="changeMode('hanzi')">한자 모드</button>
        <button id="btn-pinyin" onclick="changeMode('pinyin')">병음 모드</button>
    </div>

    <div class="quiz-box">
        <div id="question" class="question">你</div>
        <div id="hint" class="hint">(병음: nǐ)</div>
    </div>

    <form onsubmit="handleFormSubmit(event)">
        <div class="input-group">
            <input type="text" id="answer-input" placeholder="뜻(한국어)을 입력하세요" autocomplete="off" enterkeyhint="done">
            <button type="submit">확인</button>
        </div>
    </form>

    <div id="result-message" class="result"></div>

    <div class="score-board">
        진행도: <span id="current-count">0</span> / <span id="total-count">0</span> | 
        맞은 개수: <span id="correct-count">0</span>
    </div>
</div>

    let currentMode = 'hanzi';

    let solvedCount = 0;
    let pool = [...vocabulary];
    let isWaiting = false;

    function nextQuestion() {
        isWaiting = false;
        if (pool.length === 0) {
            alert(`🎉 대단합니다! 120개 단어를 전부 완료했습니다!\n맞은 개수: ${score}/${vocabulary.length}`);
            pool = [...vocabulary];
            score = 0;
            solvedCount = 0;
            updateScoreBoard();
        }

        const randomIndex = Math.floor(Math.random() * pool.length);
        currentWord = pool.splice(randomIndex, 1)[0];
        
        const qElem = document.getElementById("question");
        const hElem = document.getElementById("hint");
        const inputElem = document.getElementById("answer-input");

        inputElem.value = "";
        document.getElementById("result-message").innerHTML = "";

        if (currentMode === 'hanzi') {
            qElem.innerText = currentWord.hanzi;
            qElem.classList.remove("pinyin-mode");
            hElem.innerText = `(병음: ${currentWord.pinyin})`;
        } else {
            qElem.innerText = currentWord.pinyin;
            qElem.classList.add("pinyin-mode");
            hElem.innerText = `(한자 힌트: ${currentWord.hanzi})`;
        }
        
        // 아이패드 브라우저 포커스 유연화
        setTimeout(() => inputElem.focus(), 50);
    }

    function handleFormSubmit(event) {
        event.preventDefault(); // 폼 제출로 인한 새로고침 방지
        if (isWaiting) return;
        checkAnswer();
    }

    function checkAnswer() {
        const userAnswer = document.getElementById("answer-input").value.trim();
        const resultElem = document.getElementById("result-message");

        if(!userAnswer) return;

        isWaiting = true;
        solvedCount++;
        
        const isCorrect = currentWord.meaning.split(',').some(m => {
            return m.replace(/\s+/g, "").includes(userAnswer.replace(/\s+/g, "")) || 
                   userAnswer.replace(/\s+/g, "").includes(m.replace(/\s+/g, ""));
        });

        if (isCorrect && userAnswer !== "") {
            resultElem.className = "result correct";
            resultElem.innerText = "정답입니다! 🎉";
            score++;
            updateScoreBoard();
            setTimeout(nextQuestion, 1200);
        } else {
            resultElem.className = "result incorrect";
            resultElem.innerText = `오답 😢 (정답: ${currentWord.meaning})`;
            updateScoreBoard();
            setTimeout(nextQuestion, 2500);
        }
    }

    function updateScoreBoard() {
        document.getElementById("current-count").innerText = solvedCount;
        document.getElementById("total-count").innerText = vocabulary.length;
        document.getElementById("correct-count").innerText = score;
    }

    function changeMode(mode) {
        currentMode = mode;
        document.getElementById("btn-hanzi").classList.toggle("active", mode === 'hanzi');
        document.getElementById("btn-pinyin").classList.toggle("active", mode === 'pinyin');
        
        pool = [...vocabulary];
        score = 0;
        solvedCount = 0;
        updateScoreBoard();
        nextQuestion();
    }

    window.onload = () => {
        updateScoreBoard();
        nextQuestion();
    };
</script>

</body>
</html>
